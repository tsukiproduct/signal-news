name: Fetch, Curate & Generate Digest (3x Daily)

on:
  schedule:
    - cron: "0 22 * * *"
    - cron: "0  4 * * *"
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Phase 1 — Fetch RSS feeds
        run: python3 scripts/fetch_news.py

      - name: Gatekeeper — check raw count
        id: gate
        run: |
          COUNT=$(python3 -c "
